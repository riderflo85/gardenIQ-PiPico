name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Get code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Python
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      # 4. Check formatting with black (mode check only)
      - name: Run black check
        run: black --check .

      # 5. Check imports with isort (mode check only)
      - name: Run isort check
        run: isort --check-only --diff .

      # 6. Check code style with flake8
      - name: Run flake8
        run: flake8 .

      # 7. Run tests with coverage
      - name: Run tests with pytest and coverage
        run: |
          if [ -d tests ]; then
            pytest --cov=. --cov-report=html --cov-report=term-missing
          else
            echo "The tests/ directory does not exist, no tests were run."
          fi

      # 8. Save coverage report as an artefact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: ignore
